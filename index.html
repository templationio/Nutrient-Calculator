<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Macro Calculator Widget</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    /* CSS Variables for Dark Theme (Default) */
    :root {
      --bg-color: #191919;
      --text-color: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.1);
      --card-shadow: rgba(0, 0, 0, 0.2);
      
      --input-bg: rgba(255, 255, 255, 0.05);
      --input-border: rgba(255, 255, 255, 0.12);
      --input-focus: rgba(255, 255, 255, 0.25);
      
      --btn-bg: rgba(255, 255, 255, 0.1);
      --btn-hover: rgba(255, 255, 255, 0.15);
      
      --dropdown-bg: rgba(25, 25, 25, 0.85);
      --blob-opacity: 0.5;
    }

    /* CSS Variables for Light Theme */
    body.light-theme {
      --bg-color: #ffffff;
      --text-color: #37352f;
      --card-bg: rgba(255, 255, 255, 0.5);
      --card-border: rgba(0, 0, 0, 0.08);
      --card-shadow: rgba(0, 0, 0, 0.06);
      
      --input-bg: rgba(0, 0, 0, 0.03);
      --input-border: rgba(0, 0, 0, 0.08);
      --input-focus: rgba(0, 0, 0, 0.15);
      
      --btn-bg: rgba(0, 0, 0, 0.05);
      --btn-hover: rgba(0, 0, 0, 0.08);
      
      --dropdown-bg: rgba(255, 255, 255, 0.85);
      --blob-opacity: 0.3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    .widget-container {
      position: relative;
      width: 100%;
      max-width: 450px;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    /* --- GLASSMORPHIC CARD --- */
    .card {
      position: relative; 
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      width: 300px; 
      min-height: 440px; 
      box-shadow: 0 12px 40px 0 var(--card-shadow);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* --- LIQUID BACKGROUND (INSIDE CARD) --- */
    .card-background {
      position: absolute;
      inset: 0;
      border-radius: inherit; 
      overflow: hidden; 
      z-index: 0;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(45px);
      opacity: var(--blob-opacity);
      animation: float 12s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
      transition: opacity 0.5s ease;
    }

    .blob-1 {
      width: 200px; height: 200px;
      background: #8A2BE2; 
      top: -40px; left: -50px;
    }
    .blob-2 {
      width: 220px; height: 220px;
      background: #4169E1; 
      bottom: -50px; right: -50px;
      animation-delay: -4s;
    }
    .blob-3 {
      width: 160px; height: 160px;
      background: #DA70D6; 
      bottom: 25%; left: -30px;
      animation-delay: -8s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { transform: translate(25px, -25px) scale(1.15) rotate(10deg); }
    }

    /* --- CONTROLS --- */
    .theme-toggle {
      position: absolute;
      top: 18px; right: 18px;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--btn-bg);
      border: 1px solid var(--input-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: var(--text-color);
      z-index: 10;
    }
    .theme-toggle:hover {
      background: var(--btn-hover);
      transform: scale(1.1) rotate(15deg);
    }

    /* --- VIEWS --- */
    .view {
      position: absolute;
      inset: 0;
      padding: 56px 28px 24px; 
      display: flex;
      flex-direction: column;
      z-index: 1;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0; pointer-events: none; transform: translateX(30px);
    }
    .view.active {
      opacity: 1; pointer-events: all; transform: translateX(0);
    }
    .view.previous {
      transform: translateX(-30px);
    }

    .title {
      font-size: 16px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.5px; text-align: center; margin-bottom: 24px; opacity: 0.9;
    }

    /* --- FORM ELEMENTS --- */
    .input-group {
      display: flex; gap: 12px; margin-bottom: 12px; width: 100%;
    }
    
    .input-field {
      width: 100%; background: var(--input-bg);
      border: 1px solid var(--input-border); color: var(--text-color);
      padding: 12px 14px; border-radius: 14px; font-family: inherit; font-size: 13px;
      outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-field:focus { border-color: var(--input-focus); background: var(--btn-hover); box-shadow: 0 0 0 3px rgba(255,255,255,0.05); }
    .input-field::placeholder { color: var(--text-color); opacity: 0.4; }
    
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; margin: 0; 
    }
    input[type=number] { -moz-appearance: textfield; }

    /* --- CUSTOM SELECT (FAKE DROPDOWN) --- */
    .custom-select {
      position: relative;
      width: 100%;
    }
    .select-selected {
      background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-color);
      padding: 12px 14px; border-radius: 14px; font-size: 13px; cursor: pointer; user-select: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .select-selected::after {
      content: ""; position: absolute; right: 14px; top: 16px;
      border: 5px solid transparent; border-color: var(--text-color) transparent transparent transparent; opacity: 0.5;
    }
    .select-selected.select-arrow-active::after {
      top: 11px; border-color: transparent transparent var(--text-color) transparent;
    }
    .select-selected:hover { background: var(--btn-hover); }

    .select-items {
      position: absolute; background: var(--dropdown-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--card-border); box-shadow: 0 8px 32px 0 var(--card-shadow);
      top: 100%; left: 0; right: 0; z-index: 99; border-radius: 14px; margin-top: 6px; overflow: hidden;
    }
    .select-items div {
      padding: 12px 14px; cursor: pointer; font-size: 13px;
      border-bottom: 1px solid var(--input-border); transition: background 0.2s;
    }
    .select-items div:last-child { border-bottom: none; }
    .select-items div:hover { background: var(--btn-hover); }
    .select-hide { display: none; }

    /* --- BUTTONS & FOOTER --- */
    .btn {
      width: 100%; background: var(--btn-bg); border: 1px solid var(--input-border);
      color: var(--text-color); padding: 14px; border-radius: 14px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn:hover { background: var(--btn-hover); transform: translateY(-2px); box-shadow: 0 4px 12px var(--card-shadow); }
    .btn.outline { background: transparent; font-weight: 400; padding: 10px; border-color: transparent;}
    .btn.outline:hover { background: var(--input-bg); transform: none; box-shadow: none;}

    .spacer { flex: 1; } /* Растягивает блок, опуская футер вниз */

    .footer {
      font-size: 10px; font-weight: 300; opacity: 0.5; text-align: center;
      margin-top: 16px; transition: opacity 0.3s ease; position: relative;
    }

    #error-msg {
      color: #ff6b6b; font-size: 12px; text-align: center; margin-bottom: 12px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }

    /* --- RESULTS UI & LIQUID TABS --- */
    .goal-tabs {
      display: flex; background: var(--input-bg); border-radius: 14px; padding: 6px; margin-bottom: 24px;
      position: relative; gap: 4px; border: 1px solid var(--input-border);
    }
    .goal-tab {
      flex: 1; text-align: center; padding: 8px 0; font-size: 12px; font-weight: 500;
      cursor: pointer; border-radius: 10px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0.6; z-index: 1;
    }
    .goal-tab:hover { opacity: 0.9; }
    .goal-tab.active { background: var(--btn-bg); opacity: 1; box-shadow: 0 4px 12px var(--card-shadow); border: 1px solid var(--input-focus); }

    .chart-container { position: relative; width: 150px; height: 150px; margin: 0 auto 20px; }
    .chart-center-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    .cal-number { font-size: 28px; font-weight: 600; line-height: 1; transition: all 0.3s ease; }
    .cal-label { font-size: 11px; opacity: 0.6; margin-top: 6px; font-weight: 500; letter-spacing: 0.5px;}

    .macros-legend { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 0 10px; }
    .macro-item { display: flex; flex-direction: column; align-items: center; }
    .macro-dot { width: 10px; height: 10px; border-radius: 50%; margin-bottom: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);}
    .macro-val { font-size: 13px; font-weight: 600; transition: all 0.3s ease;}
    .macro-name { font-size: 11px; opacity: 0.6; }
  </style>
</head>
<body>

  <div class="widget-container">
    <div class="card">
      <div class="card-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
      </div>

      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle Theme">☀️</button>

      <div class="view active" id="view-input">
        <div class="title">Macros</div>
        
        <div class="input-group">
          <div class="custom-select" id="gender-select" style="flex: 1;">
            <div class="select-selected">Male</div>
            <div class="select-items select-hide">
              <div data-value="male">Male</div>
              <div data-value="female">Female</div>
            </div>
          </div>
          <input type="number" id="age" class="input-field" placeholder="Age" min="15" max="100" style="flex: 1;">
        </div>
        
        <div class="input-group">
          <input type="number" id="weight" class="input-field" placeholder="Weight (kg)">
          <input type="number" id="height" class="input-field" placeholder="Height (cm)">
        </div>

        <div class="custom-select" id="activity-select" style="margin-bottom: 12px;">
          <div class="select-selected">Sedentary (Office job)</div>
          <div class="select-items select-hide">
            <div data-value="1.2">Sedentary (Office job)</div>
            <div data-value="1.375">Light Exercise (1-2 days/wk)</div>
            <div data-value="1.55">Moderate (3-5 days/wk)</div>
            <div data-value="1.725">Active (6-7 days/wk)</div>
          </div>
        </div>

        <div class="spacer"></div>
        <div id="error-msg">Please fill all fields</div>
        <button class="btn" onclick="calculate()">Calculate</button>
        <div class="footer">Powered by templation.io</div>
      </div>

      <div class="view" id="view-result">
        <div class="goal-tabs">
          <div class="goal-tab" id="tab-loss" onclick="setGoal('loss')">Loss</div>
          <div class="goal-tab active" id="tab-maintain" onclick="setGoal('maintain')">Maintain</div>
          <div class="goal-tab" id="tab-gain" onclick="setGoal('gain')">Gain</div>
        </div>

        <div class="chart-container">
          <canvas id="macroChart"></canvas>
          <div class="chart-center-text">
            <div class="cal-number" id="cals-val">0</div>
            <div class="cal-label">KCAL</div>
          </div>
        </div>

        <div class="macros-legend">
          <div class="macro-item">
            <div class="macro-dot" style="background: #8A2BE2;"></div>
            <div class="macro-val" id="carb-val">0g</div>
            <div class="macro-name">Carbs</div>
          </div>
          <div class="macro-item">
            <div class="macro-dot" style="background: #4169E1;"></div>
            <div class="macro-val" id="pro-val">0g</div>
            <div class="macro-name">Protein</div>
          </div>
          <div class="macro-item">
            <div class="macro-dot" style="background: #DA70D6;"></div>
            <div class="macro-val" id="fat-val">0g</div>
            <div class="macro-name">Fats</div>
          </div>
        </div>

        <div class="spacer"></div>
        <button class="btn outline" onclick="showInput()">Recalculate</button>
        <div class="footer">Powered by templation.io</div>
      </div>

    </div>
  </div>

  <script>
    // --- THEME LOGIC ---
    let isLightMode = localStorage.getItem('notion-macro-theme') === 'light';
    const chartColors = { carbs: '#8A2BE2', protein: '#4169E1', fats: '#DA70D6' };

    function applyTheme() {
      document.body.classList.toggle('light-theme', isLightMode);
      document.getElementById('theme-btn').textContent = isLightMode ? '🌙' : '☀️';
      if (macroChartInstance) {
        macroChartInstance.options.plugins.tooltip.backgroundColor = isLightMode ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.8)';
        macroChartInstance.options.plugins.tooltip.titleColor = isLightMode ? '#000' : '#fff';
        macroChartInstance.options.plugins.tooltip.bodyColor = isLightMode ? '#000' : '#fff';
        macroChartInstance.update();
      }
    }

    window.toggleTheme = function() {
      isLightMode = !isLightMode;
      localStorage.setItem('notion-macro-theme', isLightMode ? 'light' : 'dark');
      applyTheme();
    };
    applyTheme();

    // --- CUSTOM SELECT LOGIC ---
    let selectedGender = 'male';
    let selectedActivity = 1.2;

    function setupCustomSelect(selectId, onSelectChange) {
      const container = document.getElementById(selectId);
      const selectedDisplay = container.querySelector('.select-selected');
      const itemsContainer = container.querySelector('.select-items');
      const options = itemsContainer.querySelectorAll('div');

      selectedDisplay.addEventListener('click', function(e) {
        e.stopPropagation();
        closeAllSelects(this);
        itemsContainer.classList.toggle('select-hide');
        this.classList.toggle('select-arrow-active');
      });

      options.forEach(opt => {
        opt.addEventListener('click', function(e) {
          selectedDisplay.textContent = this.textContent;
          onSelectChange(this.getAttribute('data-value'));
          selectedDisplay.click(); // close it
        });
      });
    }

    function closeAllSelects(excludeElement) {
      const items = document.getElementsByClassName("select-items");
      const selected = document.getElementsByClassName("select-selected");
      for (let i = 0; i < items.length; i++) {
        if (excludeElement !== selected[i]) {
          items[i].classList.add("select-hide");
          selected[i].classList.remove("select-arrow-active");
        }
      }
    }
    document.addEventListener("click", closeAllSelects);

    // Initialize custom selects
    setupCustomSelect('gender-select', val => selectedGender = val);
    setupCustomSelect('activity-select', val => selectedActivity = parseFloat(val));

    // --- CALCULATOR LOGIC ---
    let baseTDEE = 0;
    let currentGoal = 'maintain';
    let macroChartInstance = null;

    function showView(viewId) {
      document.querySelectorAll('.view').forEach(v => {
        v.classList.remove('active', 'previous');
        if (v.id !== viewId) v.classList.add('previous');
      });
      setTimeout(() => {
        document.getElementById(viewId).classList.add('active');
        document.getElementById(viewId).classList.remove('previous');
      }, 50);
    }

    window.showInput = () => showView('view-input');

    window.calculate = function() {
      const age = parseFloat(document.getElementById('age').value);
      const weight = parseFloat(document.getElementById('weight').value);
      const height = parseFloat(document.getElementById('height').value);
      const errorMsg = document.getElementById('error-msg');

      // Встроенная валидация без alert()
      if (!age || !weight || !height) {
        errorMsg.style.opacity = '1';
        setTimeout(() => { errorMsg.style.opacity = '0'; }, 3000);
        return;
      }
      errorMsg.style.opacity = '0';

      let bmr = (10 * weight) + (6.25 * height) - (5 * age);
      bmr += (selectedGender === 'male') ? 5 : -161;
      
      baseTDEE = Math.round(bmr * selectedActivity);
      
      setGoal('maintain'); 
      showView('view-result');
    };

    window.setGoal = function(goal) {
      currentGoal = goal;
      
      document.querySelectorAll('.goal-tab').forEach(tab => tab.classList.remove('active'));
      document.getElementById(`tab-${goal}`).classList.add('active');

      let targetCals = baseTDEE;
      if (goal === 'loss') targetCals -= 500; 
      if (goal === 'gain') targetCals += 300; 

      document.getElementById('cals-val').textContent = targetCals;

      const carbsCals = targetCals * 0.40;
      const proteinCals = targetCals * 0.30;
      const fatsCals = targetCals * 0.30;

      const carbsGrams = Math.round(carbsCals / 4);
      const proteinGrams = Math.round(proteinCals / 4);
      const fatsGrams = Math.round(fatsCals / 9);

      document.getElementById('carb-val').textContent = `${carbsGrams}g`;
      document.getElementById('pro-val').textContent = `${proteinGrams}g`;
      document.getElementById('fat-val').textContent = `${fatsGrams}g`;

      updateChart(carbsGrams, proteinGrams, fatsGrams);
    };

    function updateChart(c, p, f) {
      const ctx = document.getElementById('macroChart').getContext('2d');
      
      if (macroChartInstance) {
        macroChartInstance.data.datasets[0].data = [c, p, f];
        macroChartInstance.update();
        return;
      }

      Chart.defaults.color = isLightMode ? '#37352f' : '#ffffff';
      Chart.defaults.font.family = "'Inter', sans-serif";

      macroChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Carbs', 'Protein', 'Fats'],
          datasets: [{
            data: [c, p, f],
            backgroundColor: [chartColors.carbs, chartColors.protein, chartColors.fats],
            borderWidth: 0,
            hoverOffset: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '78%', 
          animation: { animateScale: true, animateRotate: true, duration: 1200, easing: 'easeOutQuart' },
          plugins: {
            legend: { display: false }, 
            tooltip: {
              backgroundColor: isLightMode ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.8)',
              titleColor: isLightMode ? '#000' : '#fff',
              bodyColor: isLightMode ? '#000' : '#fff',
              padding: 12, cornerRadius: 8, displayColors: true,
              callbacks: { label: function(context) { return ` ${context.label}: ${context.raw}g`; } }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
